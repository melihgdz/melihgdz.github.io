<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>MelihGDZ // Official</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing:border-box;
  font-family:'Segoe UI',Roboto,sans-serif;
  -webkit-tap-highlight-color: transparent; 
}

body{
  margin:0;
  min-height:100vh;
  background:#090b0c;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow-x:hidden;
}

/* ===== AKIŞKAN VE SAF RENKLİ LAV LAMBASI KATMANI ===== */
.lava-bg {
  position: fixed;
  inset: 0;
  z-index: -2;
  background: #090b0c;
  overflow: hidden;
}

.lava-blob {
  position: absolute;
  border-radius: 50%;
  mix-blend-mode: screen;
  opacity: 0.65;
}

.lava-blob.one {
  top: -10%;
  left: -5%;
  width: 450px;
  height: 450px;
  background: radial-gradient(circle, #22321f 0%, transparent 75%);
  animation: moveBlobOne 12s infinite alternate ease-in-out;
}

.lava-blob.two {
  bottom: -15%;
  right: -5%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, #162419 0%, transparent 75%);
  animation: moveBlobTwo 15s infinite alternate ease-in-out;
}

.lava-blob.three {
  top: 30%;
  left: 20%;
  width: 380px;
  height: 380px;
  background: radial-gradient(circle, #524632 0%, transparent 70%);
  animation: moveBlobThree 10s infinite alternate ease-in-out;
}

@keyframes moveBlobOne {
  0% { transform: translate(0, 0) scale(1) rotate(0deg); }
  50% { transform: translate(80px, 100px) scale(1.1) rotate(60deg); }
  100% { transform: translate(-30px, 50px) scale(0.95) rotate(120deg); }
}

@keyframes moveBlobTwo {
  0% { transform: translate(0, 0) scale(1) rotate(0deg); }
  50% { transform: translate(-80px, -110px) scale(1.15) rotate(-60deg); }
  100% { transform: translate(40px, -40px) scale(0.9) rotate(-120deg); }
}

@keyframes moveBlobThree {
  0% { transform: translate(0, 0) scale(0.9); }
  50% { transform: translate(-50px, 70px) scale(1.1); }
  100% { transform: translate(60px, -50px) scale(1); }
}

/* ===== RENKLERİN ÜZERİNDEKİ ELIT BLUR KATMANI ===== */
.blur-overlay {
  position: fixed;
  inset: 0;
  z-index: -1;
  backdrop-filter: blur(50px);
  pointer-events: none;
}

/* ===== WRAPPER ===== */
.wrap{
  width:100%;
  max-width:390px;
  padding:30px 18px;
  text-align:center;
  z-index:10;
}

/* ===== PROFİL VE LOGO ALANI (DÜZELTİLDİ) ===== */
.profile-container {
  width: 120px;
  height: 120px;
  margin: 0 auto 15px;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid rgba(255, 255, 255, 0.1);
}

.profile {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

h1{
  margin:0 0 5px;
  font-size:32px;
  font-weight: 900;
  letter-spacing: -0.5px;
  text-shadow: 0 4px 15px rgba(0,0,0,0.6);
}

/* ===== İLETİŞİM BUTONU ===== */
.mail-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  margin-bottom: 25px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.03); 
  border: 1px solid rgba(255, 255, 255, 0.08);
  color: rgba(255, 255, 255, 0.8); 
  font-size: 13px;
  font-weight: 700;
  text-decoration: none;
  transition: all 0.2s ease;
}

.mail-btn:hover, .mail-btn:active {
  background: #fff;
  color: #000;
  box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
  transform: scale(1.02);
}

.mail-btn img {
  width: 13px;
  height: 13px;
  filter: brightness(0) invert(1);
}

.mail-btn:hover img, .mail-btn:active img {
  filter: brightness(0); 
}

/* ===== GRID SİSTEMİ ===== */
.grid-container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}

.full-width {
  grid-column: span 2;
}

/* ===== BUTONLARIMIZ ===== */
.grid-item {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 22px 12px;
  border-radius: 16px;
  text-decoration: none;
  font-weight: 700;
  background: rgba(15, 18, 23, 0.65); 
  border: 1px solid rgba(255, 255, 255, 0.05);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  transition: transform 0.2s ease, background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, color 0.25s ease;
}

.full-width {
  flex-direction: row;
  justify-content: flex-start;
  padding: 18px 22px;
  gap: 14px;
}

.icon {
  width: 28px; 
  height: 28px;
  filter: brightness(0) invert(1); 
}

.label {
  color: #fff; 
  font-size: 15px;
  letter-spacing: 0.5px;
}

.full-width .label {
  font-size: 17px;
}

.grid-item:hover, .grid-item:active {
  transform: translateY(-4px);
}

/* HOVER ANINDA PARLAYAN RENKLER */
.instagram:hover, .instagram:active {
  background: #e1306c !important;
  border-color: #ff4d99 !important;
  box-shadow: 0 8px 25px rgba(225, 48, 108, 0.5) !important;
}

.youtube:hover, .youtube:active {
  background: #ff0000 !important;
  border-color: #ff4d4d !important;
  box-shadow: 0 8px 25px rgba(255, 0, 0, 0.5) !important;

.kick:hover, .kick:active {
  background: #53f40a !important;
  border-color: #7dff4d !important;
  box-shadow: 0 8px 25px rgba(83, 244, 10, 0.5) !important;
}
.kick:hover .label, .kick:active .label { color: #000 !important; }
.kick:hover .icon, .kick:active .icon { filter: brightness(0) !important; }

.tiktok:hover, .tiktok:active {
  background: #fe2c55 !important;
  border-color: #ff5e7d !important;
  box-shadow: 0 8px 25px rgba(254, 44, 85, 0.5) !important;
}

.discord:hover, .discord:active {
  background: #5865f2 !important;
  border-color: #8a99ff !important;
  box-shadow: 0 8px 25px rgba(88, 101, 242, 0.5) !important;

.x-platform:hover, .x-platform:active {
  background: #000000 !important;
  border-color: #ffffff !important;
  box-shadow: 0 8px 25px rgba(255, 255, 255, 0.3) !important;
}

.footer{
  margin-top:25px;
  font-size:11px;
  opacity: 0.3;
  letter-spacing: 1px;
}
</style>
</head>
